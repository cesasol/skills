stages:
  - install
  - quality
  - test
  - build

variables:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.32.1'
  PNPM_STORE_DIR: '$CI_PROJECT_DIR/.pnpm-store'

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

.node-image: &node-image
  image: node:${NODE_VERSION}-bookworm-slim

.setup-pnpm: &setup-pnpm
  - corepack enable
  - corepack prepare pnpm@${PNPM_VERSION} --activate
  - pnpm config set store-dir "$PNPM_STORE_DIR"

.pnpm-cache: &pnpm-cache
  key:
    files: [pnpm-lock.yaml]
    prefix: ${CI_COMMIT_REF_SLUG}
  paths: [.pnpm-store, node_modules]
  policy: pull

install:
  stage: install
  <<: *node-image
  cache:
    <<: *pnpm-cache
    policy: pull-push
  script:
    - *setup-pnpm
    - pnpm install --frozen-lockfile
  artifacts:
    paths: [node_modules]
    expire_in: 1 hour

lint:
  stage: quality
  <<: *node-image
  needs: [install]
  cache:
    <<: *pnpm-cache
  script:
    - *setup-pnpm
    - pnpm lint

typecheck:
  stage: quality
  <<: *node-image
  needs: [install]
  cache:
    <<: *pnpm-cache
  script:
    - *setup-pnpm
    - pnpm typecheck

test:unit:
  stage: test
  <<: *node-image
  needs: [install]
  cache:
    <<: *pnpm-cache
  script:
    - *setup-pnpm
    - pnpm test:coverage --reporter=junit --outputFile=junit.xml
  coverage: '/All files[^|]*\|[^|]*\s+([\d.]+)/'
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths: [coverage/]

test:e2e:
  stage: test
  image: mcr.microsoft.com/playwright:v1.50.0-jammy
  needs: [install]
  cache:
    <<: *pnpm-cache
  script:
    - *setup-pnpm
    - pnpm install --frozen-lockfile --prefer-offline
    - pnpm test:e2e
  artifacts:
    when: always
    expire_in: 1 week
    paths: [playwright-report/, test-results/]
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:
  stage: build
  <<: *node-image
  needs: [install, lint, typecheck, test:unit]
  cache:
    <<: *pnpm-cache
  script:
    - *setup-pnpm
    - pnpm build
  artifacts:
    expire_in: 1 day
    paths: [.output/, dist/]
