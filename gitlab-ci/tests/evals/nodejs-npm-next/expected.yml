stages:
  - quality
  - test
  - build

variables:
  NODE_VERSION: '22'

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

default:
  image: node:${NODE_VERSION}-bookworm-slim
  cache:
    key:
      files: [package-lock.json]
      prefix: ${CI_COMMIT_REF_SLUG}
    paths: [node_modules]
    policy: pull-push

lint:
  stage: quality
  script:
    - npm ci
    - npm run lint

typecheck:
  stage: quality
  script:
    - npm ci
    - npm run typecheck

test:
  stage: test
  script:
    - npm ci
    - npm test -- --reporter=junit --outputFile=junit.xml
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: junit.xml

build:
  stage: build
  needs: [lint, typecheck, test]
  script:
    - npm ci
    - npm run build
  artifacts:
    expire_in: 1 day
    paths: [.next/]
