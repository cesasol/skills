stages:
  - install
  - test
  - build

variables:
  GO_VERSION: '1.23'
  GOPATH: '$CI_PROJECT_DIR/.go'
  GOCACHE: '$CI_PROJECT_DIR/.go-build-cache'
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: '/certs'

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

.go-cache: &go-cache
  key:
    files: [go.sum]
    prefix: ${CI_COMMIT_REF_SLUG}
  paths: [.go/pkg/mod, .go-build-cache]
  policy: pull

download:
  stage: install
  image: golang:${GO_VERSION}-bookworm
  cache:
    <<: *go-cache
    policy: pull-push
  script:
    - go mod download

test:
  stage: test
  image: golang:${GO_VERSION}-bookworm
  needs: [download]
  cache:
    <<: *go-cache
  script:
    - go test -race ./...
  artifacts:
    when: always
    expire_in: 1 week
    paths: [coverage.out]

build:docker:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  needs: [test]
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
  artifacts:
    expire_in: 1 day
    paths: []
