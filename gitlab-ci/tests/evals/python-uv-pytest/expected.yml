stages:
  - quality
  - test

variables:
  PYTHON_VERSION: '3.12'

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

default:
  image: python:${PYTHON_VERSION}-slim
  cache:
    key:
      files: [uv.lock]
      prefix: ${CI_COMMIT_REF_SLUG}
    paths: [.venv, .uv-cache]
    policy: pull-push
  before_script:
    - pip install uv --quiet
    - uv sync --frozen

lint:
  stage: quality
  script:
    - uv run ruff check .
    - uv run ruff format --check .

typecheck:
  stage: quality
  script:
    - uv run mypy .

test:
  stage: test
  needs: [lint, typecheck]
  script:
    - uv run pytest --junitxml=junit.xml --cov=. --cov-report=xml:coverage.xml
  coverage: '/TOTAL.*\s+([\d.]+)%/'
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths: [coverage.xml]
