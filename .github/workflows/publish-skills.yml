name: Publish Skills

on:
  push:
    branches: [main]
    tags: ["*"]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - uses: extractions/setup-just@v3

      - name: Run CI recipes
        run: just ci

  package:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: extractions/setup-just@v3

      - name: Discover and package skills
        run: just package

      - uses: actions/upload-artifact@v4
        with:
          name: skills
          path: dist/*.skill

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: skills
          path: dist

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHA="${GITHUB_SHA::8}"
          TAG="latest"

          # If this is a tag push, use the tag as version
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$VERSION"
          fi

          # Delete existing "latest" release if updating (ignore errors)
          if [[ "$TAG" == "latest" ]]; then
            gh release delete latest --yes 2>/dev/null || true
            git push origin :refs/tags/latest 2>/dev/null || true
          fi

          # Create release with all .skill files
          gh release create "$TAG" dist/*.skill \
            --title "Skills ($TAG)" \
            --notes "Published from commit ${GITHUB_SHA}

          ## Packaged skills
          $(ls -1 dist/*.skill | sed 's|dist/|- |; s|\.skill||')" \
            $( [[ "$TAG" == "latest" ]] && echo "--latest" || echo "" )

          echo "Published release: $TAG"
          ls -lh dist/
