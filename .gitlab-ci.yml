# ─────────────────────────────────────────────────────────────────────────────
# skills — GitLab CI/CD pipeline
#
# Stages:
#   • validate  — lint + Agent Skills spec validation (just ci)
#   • package   — bundle skills into .skill archives
#   • publish   — upload to GitLab Package Registry
#
# Generated by gitlab-ci skill — apply best practices to existing pipeline.
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - validate
  - package
  - publish

variables:
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic"
  # Cache downloaded tools under $CI_PROJECT_DIR so they're cacheable.
  TOOLS_DIR: '$CI_PROJECT_DIR/.tools'

# ─── Workflow rules ──────────────────────────────────────────────────────────
# Run pipelines for: merge requests, default branch (main), and tags.
# Skip duplicate "branch pipeline + MR pipeline" by suppressing the branch
# pipeline when an MR is open for that branch.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

# ─── Reusable bits ───────────────────────────────────────────────────────────

# Base image + tool setup. Jobs that need uv + just extend this.
.alpine-tools: &alpine-tools
  image: alpine:latest
  cache:
    key:
      files: [justfile]
      prefix: ${CI_COMMIT_REF_SLUG}
    paths: [.tools]
    policy: pull-push
  before_script:
    - apk add --no-cache bash curl zip findutils
    - export PATH="$TOOLS_DIR:$HOME/.local/bin:$PATH"
    - |
      # Install uv if not cached
      if [ ! -x "$TOOLS_DIR/uv" ]; then
        mkdir -p "$TOOLS_DIR"
        curl -LsSf https://astral.sh/uv/install.sh | sh -s -- -b "$TOOLS_DIR"
      fi
    - |
      # Install just if not cached
      if [ ! -x "$TOOLS_DIR/just" ]; then
        curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
          | bash -s -- --to "$TOOLS_DIR"
      fi

# Discover skill directories (any dir containing SKILL.md)
.skill_dirs: &skill_dirs
  - |
    SKILLS=$(find . -maxdepth 1 -mindepth 1 -type d \
      ! -name '.*' \
      -exec test -f '{}/SKILL.md' \; -print \
      | sed 's|^\./||' | sort)

# ─── validate ────────────────────────────────────────────────────────────────
validate:
  stage: validate
  <<: *alpine-tools
  script:
    - just ci
  interruptible: true

# ─── package ─────────────────────────────────────────────────────────────────
package:
  stage: package
  <<: *alpine-tools
  needs: [validate]
  script:
    - just package
    - echo "--- Packaged skills ---"
    - ls -lh dist/
  artifacts:
    paths:
      - dist/*.skill
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  interruptible: true

# ─── publish ─────────────────────────────────────────────────────────────────
publish:
  stage: publish
  <<: *alpine-tools
  needs: [package]
  before_script:
    - apk add --no-cache curl findutils
  script:
    - *skill_dirs
    - VERSION="${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}"
    - |
      for skill in $SKILLS; do
        FILE="dist/${skill}.skill"
        if [ ! -f "$FILE" ]; then
          echo "WARN: $FILE not found, skipping"
          continue
        fi

        echo "Publishing: $skill @ $VERSION"
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$FILE" \
          "${PACKAGE_REGISTRY_URL}/${skill}/${VERSION}/${skill}.skill"

        # Also publish as "latest" for unversioned installs
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$FILE" \
          "${PACKAGE_REGISTRY_URL}/${skill}/latest/${skill}.skill"

        echo "  -> Published ${skill} ${VERSION} + latest"
      done
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
