

# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

# All builtin hooks below run as fast Rust-native implementations bundled in
# the prek binary itself (no Python, no network, no environment setup).
[[repos]]
repo = "builtin"
hooks = [
  # Whitespace & EOL hygiene
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
  # Syntax validation for config-as-code
  { id = "check-yaml" },
  { id = "check-json" },
  { id = "check-json5" },
  { id = "check-toml" },
  { id = "check-xml" },
  # Merge / VCS safety
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },
  # Executable scripts
  { id = "check-shebang-scripts-are-executable" },
  { id = "check-executables-have-shebangs" },
  # Secrets / large files
  { id = "detect-private-key" },
  { id = "check-added-large-files", args = ["--maxkb=512"] }
]

[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [{ id = "gitleaks" }]

# Recipes (First party only)

# For python projects ruff check and format
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.12"
hooks = [
  { id = "ruff-check" },
  { id = "ruff-format" }
]

# To lint/format markdown (pair with .rumdl.toml)
[[repos]]
repo = "https://github.com/rvben/rumdl-pre-commit"
rev = "v0.1.91"
hooks = [
  { id = "rumdl" },
  { id = "rumdl-fmt" }
]
